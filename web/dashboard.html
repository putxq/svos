<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVOS | Founder Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg: #0a0e17; --surface: #111827; --surface2: #1f2937; --border: #374151; --text: #f9fafb; --text2: #9ca3af; --accent: #3b82f6; --accent2: #8b5cf6; --green: #10b981; --red: #ef4444; --orange: #f59e0b; --cyan: #06b6d4; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
.header { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.5rem; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text2); }
.header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
.grid-wide { grid-template-columns: 1fr 1fr; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: border-color 0.2s; }
.card:hover { border-color: var(--accent); }
.card-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 12px; }
.card-value { font-size: 2.2rem; font-weight: 700; }
.stat-blue { color: var(--accent); }
.stat-green { color: var(--green); }
.stat-purple { color: var(--accent2); }
.stat-cyan { color: var(--cyan); }
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.agent-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 24px rgba(59,130,246,0.1); }
.agent-role { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
.agent-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; display: inline-block; margin-bottom: 12px; }
.status-active { background: rgba(16,185,129,0.15); color: var(--green); }
.agent-tools { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-tag { font-size: 0.7rem; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.panel-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.chat-messages { max-height: 400px; overflow-y: auto; margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: 8px; }
.msg { padding: 8px 12px; margin-bottom: 8px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; }
.msg-user { background: var(--accent); color: #fff; margin-left: 40px; text-align: left; direction: ltr; }
.msg-agent { background: var(--surface2); margin-right: 40px; }
.msg-role { font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
.input-row { display: flex; gap: 8px; }
.input-row input, .input-row select { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.9rem; }
.input-row select { flex: 0 0 120px; }
.btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--red); color: #fff; }
.tool-test { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tool-test label { font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; display: block; }
.tool-test input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; }
.result-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; direction: ltr; text-align: left; }
.section { margin-bottom: 32px; }
.section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
@media (max-width: 768px) { .grid-wide { grid-template-columns: 1fr; } .container { padding: 12px; } .tool-test { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
<h1>SVOS Founder Dashboard</h1>
<div class="status"><div class="dot"></div><span id="sys-status">Connecting...</span></div>
</div>
<div class="container">
<div class="grid" id="stats-grid">
<div class="card"><div class="card-title">Active Agents</div><div class="card-value stat-blue" id="stat-agents">--</div></div>
<div class="card"><div class="card-title">Registered Tools</div><div class="card-value stat-green" id="stat-tools">--</div></div>
<div class="card"><div class="card-title">API Endpoints</div><div class="card-value stat-purple" id="stat-routes">--</div></div>
<div class="card"><div class="card-title">System Version</div><div class="card-value stat-cyan" id="stat-version">--</div></div>
</div>
<div class="section"><div class="section-title">C-Suite Agents</div><div class="agent-grid" id="agent-grid"></div></div>
<div class="grid grid-wide">
<div class="panel"><div class="panel-title">Chat with Agent</div><div class="chat-messages" id="chat-messages"></div><div class="input-row"><select id="chat-agent"><option value="CEO">CEO</option><option value="CFO">CFO</option><option value="CMO">CMO</option><option value="COO">COO</option><option value="CTO">CTO</option><option value="CLO">CLO</option><option value="CHRO">CHRO</option></select><input id="chat-input" placeholder="Type your message..." /><button class="btn btn-primary" onclick="sendChat()">Send</button></div></div>
<div class="panel"><div class="panel-title">Agent Discussion</div><div class="chat-messages" id="discuss-messages"></div><div class="input-row"><input id="discuss-topic" placeholder="Discussion topic..." /><button class="btn btn-primary" onclick="startDiscussion()">Discuss</button></div></div>
</div>
<div class="section" style="margin-top:24px;"><div class="section-title">Tool Testing Console</div>
<div class="grid grid-wide">
<div class="panel"><div class="panel-title">WhatsApp (Dry Run)</div><div class="tool-test"><div><label>Phone</label><input id="wa-to" value="+966500000000" /></div><div><label>Message</label><input id="wa-body" value="Test from SVOS Dashboard" /></div></div><div style="margin-top:12px;display:flex;gap:8px;"><button class="btn btn-primary" onclick="testWhatsApp()">Send</button></div><div class="result-box" id="wa-result" style="margin-top:12px;">Ready</div></div>
<div class="panel"><div class="panel-title">Landing Page Generator</div><div class="tool-test"><div><label>Title</label><input id="lp-title" value="SVOS Digital" /></div><div><label>Headline</label><input id="lp-headline" value="Build Your AI Company" /></div></div><div style="margin-top:12px;"><button class="btn btn-primary" onclick="testLandingPage()">Generate</button></div><div class="result-box" id="lp-result" style="margin-top:12px;">Ready</div></div>
</div></div>
</div>
<script>
const API = window.location.origin;
let SVOS_API_KEY = localStorage.getItem("svos_api_key") || "";
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (SVOS_API_KEY) opts.headers['x-api-key'] = SVOS_API_KEY;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function ensureApiKey() {
  if (SVOS_API_KEY) return true;
  const entered = prompt('Enter your SVOS API key');
  if (!entered) return false;
  SVOS_API_KEY = entered.trim();
  localStorage.setItem('svos_api_key', SVOS_API_KEY);
  return !!SVOS_API_KEY;
}

async function loadOverview() {
  if (!ensureApiKey()) { document.getElementById('sys-status').textContent = 'Missing API key'; return; }
  try {
    const d = await api('/dashboard/overview');
    const totalAgents = d?.system?.total_agents ?? d?.agents_total ?? 0;
    const totalTools = d?.system?.total_tools ?? 4;
    const totalRoutes = d?.system?.total_routes ?? 0;
    const version = d?.system?.version ?? d?.version ?? 'v1';

    document.getElementById('stat-agents').textContent = totalAgents;
    document.getElementById('stat-tools').textContent = totalTools;
    document.getElementById('stat-routes').textContent = totalRoutes;
    document.getElementById('stat-version').textContent = version;
    document.getElementById('sys-status').textContent = 'System Online';

    const grid = document.getElementById('agent-grid');
    grid.innerHTML = '';

    let agents = d?.agents;
    if (!Array.isArray(agents)) {
      const ag = await api('/dashboard/agents');
      agents = ag?.agents || [];
    }

    agents.forEach(a => {
      const role = a.role || a.id || 'AGENT';
      const tools = (a.tools || a.tools_available || []).map(t => '<span class="tool-tag">'+t+'</span>').join('');
      grid.innerHTML += '<div class="agent-card" onclick="selectAgent(\''+role+'\')">' + '<div class="agent-role">'+role+'</div>' + '<span class="agent-status status-active">Active</span>' + '<div class="agent-tools">'+tools+'</div></div>';
    });
  } catch(e) {
    document.getElementById('sys-status').textContent = 'Connection Error';
  }
}
function selectAgent(role) { document.getElementById('chat-agent').value = role; document.getElementById('chat-input').focus(); }
async function sendChat() {
  const agent = document.getElementById('chat-agent').value;
  const msg = document.getElementById('chat-input').value;
  if (!msg) return;
  const box = document.getElementById('chat-messages');
  box.innerHTML += '<div class="msg msg-user">'+msg+'</div>';
  document.getElementById('chat-input').value = '';
  try {
    const d = await api('/dashboard/chat', 'POST', {agent_role: agent, message: msg});
    const reply = d.response || d.error || JSON.stringify(d);
    box.innerHTML += '<div class="msg msg-agent"><div class="msg-role">'+agent+'</div>'+reply+'</div>';
  } catch(e) {
    box.innerHTML += '<div class="msg msg-agent" style="color:var(--red)">Error: '+e.message+'</div>';
  }
  box.scrollTop = box.scrollHeight;
}
async function startDiscussion() {
  const topic = document.getElementById('discuss-topic').value;
  if (!topic) return;
  const box = document.getElementById('discuss-messages');
  box.innerHTML += '<div class="msg msg-user">Topic: '+topic+'</div>';
  try {
    const d = await api('/dashboard/discuss', 'POST', {topic: topic, agents: ['CEO','CFO','CMO','CTO']});
    if (d.rounds) {
      d.rounds.forEach(r => {
        box.innerHTML += '<div class="msg msg-agent"><div class="msg-role">'+r.agent+'</div>'+r.message+'</div>';
      });
    } else {
      box.innerHTML += '<div class="msg msg-agent">'+JSON.stringify(d, null, 2)+'</div>';
    }
  } catch(e) {
    box.innerHTML += '<div class="msg msg-agent" style="color:var(--red)">Error: '+e.message+'</div>';
  }
  box.scrollTop = box.scrollHeight;
}
async function testWhatsApp() {
  const r = await api('/tools/whatsapp/send', 'POST', {
    agent_role: 'CMO',
    to: document.getElementById('wa-to').value,
    body: document.getElementById('wa-body').value
  });
  document.getElementById('wa-result').textContent = JSON.stringify(r, null, 2);
}
async function testLandingPage() {
  const r = await api('/tools/landing-page/generate', 'POST', {
    agent_role: 'CMO',
    title: document.getElementById('lp-title').value,
    headline: document.getElementById('lp-headline').value,
    lang: 'ar'
  });
  document.getElementById('lp-result').textContent = JSON.stringify(r, null, 2);
}
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key==='Enter') sendChat(); });
document.getElementById('discuss-topic').addEventListener('keydown', e => { if (e.key==='Enter') startDiscussion(); });
loadOverview();
setInterval(loadOverview, 30000);
</script>
</body>
</html>
