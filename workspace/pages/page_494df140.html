<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVOS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#F9FAFB;color:#1a1a2e;direction:ltr}
    .hero{text-align:center;padding:80px 20px;background:linear-gradient(135deg,#2563EB,#1e40af);color:#fff}
    .hero h1{font-size:2.8rem;margin-bottom:16px}
    .hero p{font-size:1.3rem;opacity:0.9;margin-bottom:32px}
    .cta{display:inline-block;padding:16px 48px;background:#fff;color:#2563EB;border-radius:8px;font-size:1.1rem;font-weight:700;text-decoration:none;transition:transform 0.2s}
    .cta:hover{transform:scale(1.05)}
    .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px;padding:60px 40px;max-width:1000px;margin:0 auto}
    .feature{background:#fff;padding:32px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .feature h3{color:#2563EB;margin-bottom:8px}
    .logo{max-height:48px;margin-bottom:24px}
    footer{text-align:center;padding:32px;color:#888;font-size:0.85rem}
  </style>
</head>
<body>
  <div class="hero">
    
    <h1>Build Your Digital Company</h1>
    <p>AI-Powered Sovereign System</p>
    <a href="#" class="cta">Get Started</a>
  </div>
  <section class="features"><div class="feature"><h3>24/7 Agents</h3></div><div class="feature"><h3>Smart Governance</h3></div><div class="feature"><h3>Auto Execution</h3></div></section>
  <footer>Powered by SVOS &mdash; 2026-03-21</footer>
</body>
</html>
